name: Slugify

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        check-latest: true
        cache: true

    - name: Install dependencies
      run: go mod tidy

    - name: Run Tests
      run: go test -v ./...
